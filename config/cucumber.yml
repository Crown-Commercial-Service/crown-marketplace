<%
rerun = File.file?('rerun.txt') ? IO.read('rerun.txt') : ""
rerun = rerun.strip.gsub /\s/, ' '
rerun_opts = rerun.empty? ? "--format #{ENV['CUCUMBER_FORMAT'] || 'progress'} features" : "--format #{ENV['CUCUMBER_FORMAT'] || 'pretty'} #{rerun}"
std_opts = "--format #{ENV['CUCUMBER_FORMAT'] || 'pretty'} --strict --tags 'not @wip and not @accessibility' --publish-quiet --retry 2"
accessibility_opts = "--format #{ENV['CUCUMBER_FORMAT'] || 'pretty'} --strict --tags '@accessibility' --publish-quiet "
%>
default: <%= std_opts %> features
wip: --tags @wip:3 --wip features --publish-quiet
rerun: <%= rerun_opts %> --format rerun --out rerun.txt --strict --tags 'not @wip'
accessibility: <%= accessibility_opts %> features/accessibility
<% [
  ['crown-marketplace', 'crown_marketplace', %w[]],
  ['facilities-management', 'facilities_management', %w[RM3830 RM6232 RM6378]],
].each do |service_slug, service_folder, frameworks| %>
<%= service_slug %>: <%= std_opts %> features/<%= service_folder %>
<% frameworks.each do |framework| %>
<%= service_slug %>:<%= framework %>: <%= std_opts %> features/<%= service_folder %>/<%= framework.downcase %>
<% end %>
<% end %>